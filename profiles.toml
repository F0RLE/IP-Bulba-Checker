# Bulbascan Service Profiles
#
# Each [[services]] entry defines one logical service with its hostnames.
# This file is loaded at startup from the directory containing the binary.
# If the file is not found, a compiled-in copy is used as a fallback.
#
# Fields:
#   name                  — display name used in reports
#   browser_verification  — probe with a real browser if available
#   expected_roles        — all host roles expected to be present
#   critical_roles        — roles whose block triggers ProxyRequired
#
# Each [[services.hosts]] entry:
#   domain                — hostname (matched as suffix of target)
#   role                  — semantic role label (web/auth/api/assets/app/…)
#   probe_paths           — URL paths to probe (in addition to /)

# ─── AI Services ─────────────────────────────────────────────────────────────

[[services]]
name = "OpenAI"
browser_verification = true
expected_roles = ["web", "auth", "console", "api", "assets"]
critical_roles  = ["web", "auth", "api"]

[[services.hosts]]
domain = "chat.openai.com"
role   = "web"
probe_paths = ["/", "/auth/login"]

[[services.hosts]]
domain = "chatgpt.com"
role   = "web"
probe_paths = ["/", "/auth/login"]

[[services.hosts]]
domain = "auth.openai.com"
role   = "auth"
probe_paths = ["/", "/u/login"]

[[services.hosts]]
domain = "platform.openai.com"
role   = "console"
probe_paths = ["/", "/login"]

[[services.hosts]]
domain = "api.openai.com"
role   = "api"
probe_paths = ["/"]

[[services.hosts]]
domain = "oaistatic.com"
role   = "assets"
probe_paths = ["/"]

[[services.hosts]]
domain = "oaiusercontent.com"
role   = "assets"
probe_paths = ["/"]

